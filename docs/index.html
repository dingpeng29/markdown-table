<script>
var alignments=['left','left','left'];

function getData(){
var rows=[];
var ths=document.querySelectorAll('#editTable thead th');
var header=[];
ths.forEach(function(th){header.push(th.textContent.trim()||' ');});
rows.push(header);

var trs=document.querySelectorAll('#editTable tbody tr');
trs.forEach(function(tr){
var row=[];
tr.querySelectorAll('td input').forEach(function(inp){row.push(inp.value);});
rows.push(row);
});
return rows;
}

function genMarkdown(){
var data=getData();
if(data.length===0)return'';
var cols=data[0].length;
while(alignments.length<cols)alignments.push('left');

var lines=[];
lines.push('| '+data[0].join(' | ')+' |');

var sep='|';
for(var i=0;i<cols;i++){
var a=alignments[i]||'left';
if(a==='left')sep+=' :--- |';
else if(a==='center')sep+=' :---: |';
else sep+=' ---: |';
}
lines.push(sep);

for(var r=1;r<data.length;r++){
lines.push('| '+data[r].map(function(c){return c||' ';}).join(' | ')+' |');
}
return lines.join('\n');
}

function renderPreview(){
var md=genMarkdown();
document.getElementById('mdCode').innerHTML='<button class="copy-btn" onclick="copyMd()">复制</button>'+escHtml(md);

var data=getData();
if(data.length===0){document.getElementById('preview').innerHTML='';return;}
var h='<table><thead><tr>';
data[0].forEach(function(c){h+='<th>'+escHtml(c)+'</th>';});
h+='</tr></thead><tbody>';
for(var r=1;r<data.length;r++){
h+='<tr>';
data[r].forEach(function(c){h+='<td>'+escHtml(c||'')+'</td>';});
h+='</tr>';
}
h+='</tbody></table>';
document.getElementById('preview').innerHTML=h;
}

function addRow(){
var tbody=document.querySelector('#editTable tbody');
var tr=document.createElement('tr');
var cols=document.querySelectorAll('#editTable thead th').length;
for(var i=0;i<cols;i++){var td=document.createElement('td');td.innerHTML='<input value="" placeholder="内容...">';tr.appendChild(td);}
tbody.appendChild(tr);
bindInputs();
renderPreview();
}

function addCol(){
var i=document.querySelectorAll('#editTable thead th').length;
var th=document.createElement('th');th.textContent='列标题';th.contentEditable='true';
document.querySelector('#editTable thead tr').appendChild(th);
document.querySelectorAll('#editTable tbody tr').forEach(function(tr){
var td=document.createElement('td');td.innerHTML='<input value="" placeholder="内容...">';tr.appendChild(td);
});
alignments.push('left');
bindInputs();
renderPreview();
}

function delRow(){
var tbody=document.querySelector('#editTable tbody');
if(tbody.rows.length>1)tbody.deleteRow(tbody.rows.length-1);
renderPreview();
}

function delCol(){
var ths=document.querySelectorAll('#editTable thead th');
if(ths.length<=1)return;
var idx=ths.length-1;
ths[idx].remove();
document.querySelectorAll('#editTable tbody tr').forEach(function(tr){if(tr.cells[idx])tr.cells[idx].remove();});
alignments.pop();
renderPreview();
}

function resetTable(){
var thead=document.querySelector('#editTable thead tr');
thead.innerHTML='<th>列标题</th><th>列标题</th><th>列标题</th>';
var tbody=document.querySelector('#editTable tbody');
tbody.innerHTML='<tr><td><input value="" placeholder="内容..."></td><td><input value="" placeholder="内容..."></td><td><input value="" placeholder="内容..."></td></tr><tr><td><input value="" placeholder="内容..."></td><td><input value="" placeholder="内容..."></td><td><input value="" placeholder="内容..."></td></tr>';
alignments=['left','left','left'];
bindInputs();
renderPreview();
}

function bindInputs(){
document.querySelectorAll('#editTable thead th').forEach(function(th){th.addEventListener('input',renderPreview);});
document.querySelectorAll('#editTable td input').forEach(function(inp){inp.addEventListener('input',renderPreview);});
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function copyMd(){
var code=document.getElementById('mdCode').textContent;
navigator.clipboard.writeText(code).then(function(){
var t=document.createElement('div');t.className='toast';t.textContent='Markdown表格已复制';document.body.appendChild(t);setTimeout(function(){t.remove();},1800);
});
}

function makeHeadersEditable(){
document.querySelectorAll('#editTable thead th').forEach(function(th,i){
th.contentEditable='true';
th.addEventListener('blur',function(){renderPreview();});
});
}

makeHeadersEditable();
bindInputs();
renderPreview();
</script>
